[build]
  publish = "dist/public"

# Proxy /api/* requests to the Render backend
# Replace YOUR_RENDER_URL below with your actual Render service URL
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_RENDER_URL.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — all other routes load index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
